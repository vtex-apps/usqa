name: '[QE] Quality Engineering'

on:
  # Just to make easier debug typos
  workflow_dispatch:
jobs:
  safeCheck:
    name: 'Security check'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: 'Test beta version of workflow'
        uses: vtex/action-toolbelt@main
        with:
            account: productusqa
            appKey: ${{ secrets.VTEX_APP_KEY }}
            appToken: ${{ secrets.VTEX_APP_TOKEN }}
            workspace: master
            bin: vtex-test
            git: vtex/toolbelt
            branch: qe/cypress
